<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 40" width="240" preserveAspectRatio="xMidYMid meet" role="img" aria-label="water ripple">
  <g fill="none" stroke="#22d3ee" stroke-width="1" stroke-dasharray="2 3">
    <circle cx="150" cy="20" r="0">
      <animate attributeName="r" values="0;80" dur="4.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.85;0" dur="4.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="150" cy="20" r="0">
      <animate attributeName="r" values="0;80" dur="4.5s" begin="1.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.85;0" dur="4.5s" begin="1.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="150" cy="20" r="0">
      <animate attributeName="r" values="0;80" dur="4.5s" begin="3s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.85;0" dur="4.5s" begin="3s" repeatCount="indefinite"/>
    </circle>
  </g>
  <circle cx="150" cy="20" r="1.4" fill="#67e8f9" opacity="0.9"/>
</svg>
