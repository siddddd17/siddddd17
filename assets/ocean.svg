<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 220" width="100%" preserveAspectRatio="xMidYMid meet" role="img" aria-label="whale drifting through a dark ocean">
  <defs>
    <linearGradient id="ocean" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#020617"/>
      <stop offset="55%" stop-color="#050c1f"/>
      <stop offset="100%" stop-color="#0a1e3a"/>
    </linearGradient>
    <linearGradient id="haze" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#050914" stop-opacity="1"/>
      <stop offset="10%"  stop-color="#050914" stop-opacity="0"/>
      <stop offset="90%"  stop-color="#050914" stop-opacity="0"/>
      <stop offset="100%" stop-color="#050914" stop-opacity="1"/>
    </linearGradient>
  </defs>

  <rect width="900" height="220" fill="url(#ocean)"/>

  <!-- distant horizon glow -->
  <rect y="34" width="900" height="1" fill="#22d3ee" opacity="0.35"/>
  <rect y="35" width="900" height="6" fill="#22d3ee" opacity="0.05"/>

  <!-- upper wave -->
  <text y="60" font-family="ui-monospace, 'JetBrains Mono', Menlo, monospace" font-size="13" fill="#22d3ee" opacity="0.4" xml:space="preserve">
    <animate attributeName="x" values="0;-46;0" dur="7s" repeatCount="indefinite"/>
    ~    ~ ~    ~ ~    ~ ~    ~ ~    ~ ~    ~ ~    ~ ~    ~ ~    ~ ~    ~ ~    ~ ~    ~ ~    ~ ~    ~
  </text>

  <!-- mid wave -->
  <text y="82" font-family="ui-monospace, 'JetBrains Mono', Menlo, monospace" font-size="13" fill="#0891b2" opacity="0.32" xml:space="preserve">
    <animate attributeName="x" values="-30;30;-30" dur="10s" repeatCount="indefinite"/>
     .   ~   .   ~   ~   .   ~   ~   .   ~   .   ~   ~   .   ~   .   ~   .   ~   ~   .   ~   .   ~   ~
  </text>

  <!-- whale silhouette group (drifts left to right) -->
  <g font-family="ui-monospace, 'JetBrains Mono', Menlo, monospace" font-size="14" fill="#7dd3fc">
    <text y="126" xml:space="preserve">        .-~~~-.</text>
    <text y="140" xml:space="preserve">      /`   o   `.</text>
    <text y="154" xml:space="preserve">     /___________)__</text>
    <text y="168" xml:space="preserve">     `.__________.-'</text>
    <animateTransform attributeName="transform" type="translate"
      values="-260,0; 900,0" dur="32s" repeatCount="indefinite"/>
  </g>

  <!-- ambient bubbles -->
  <g font-family="ui-monospace, 'JetBrains Mono', Menlo, monospace" fill="#67e8f9">
    <text x="120" font-size="11" opacity="0">o
      <animate attributeName="y" values="185;60" dur="6s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.75;0" dur="6s" repeatCount="indefinite"/>
    </text>
    <text x="230" font-size="10" opacity="0">.
      <animate attributeName="y" values="195;70" dur="7s" begin="1.2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.7;0" dur="7s" begin="1.2s" repeatCount="indefinite"/>
    </text>
    <text x="380" font-size="11" opacity="0">o
      <animate attributeName="y" values="185;55" dur="8s" begin="2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.7;0" dur="8s" begin="2s" repeatCount="indefinite"/>
    </text>
    <text x="540" font-size="10" opacity="0">.
      <animate attributeName="y" values="195;75" dur="6.5s" begin="0.7s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.75;0" dur="6.5s" begin="0.7s" repeatCount="indefinite"/>
    </text>
    <text x="660" font-size="11" opacity="0">o
      <animate attributeName="y" values="185;65" dur="7.5s" begin="3s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.7;0" dur="7.5s" begin="3s" repeatCount="indefinite"/>
    </text>
    <text x="780" font-size="10" opacity="0">.
      <animate attributeName="y" values="195;60" dur="8s" begin="1.8s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.7;0" dur="8s" begin="1.8s" repeatCount="indefinite"/>
    </text>
  </g>

  <!-- deep floor motion -->
  <text y="205" font-family="ui-monospace, 'JetBrains Mono', Menlo, monospace" font-size="13" fill="#0e7490" opacity="0.35" xml:space="preserve">
    <animate attributeName="x" values="0;-36;0" dur="14s" repeatCount="indefinite"/>
    ~     ~~     ~     ~~     ~~     ~     ~~     ~     ~~~     ~     ~~     ~     ~~     ~     ~~     ~
  </text>

  <!-- side haze fadeout -->
  <rect width="900" height="220" fill="url(#haze)"/>
</svg>
